<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>擂台赛脚手架 · 全栈底座</title>

<!--
============================================================================
  灵治擂台赛 · 通用前端（主题无关）—— 由 ../server.js 托管
  ---------------------------------------------------------------------------
  这是「明天开题前先有个底」的底座，不是定死的方案。随时能推翻重写。

  关键点：
   - AI 调用统一走后端 /api/ai（token 在服务端，前端永不接触密钥）
   - callAI() 内置兜底：后端任何失败都返回 fallback，演示绝不翻车
   - localStorage 持久化、CSS 变量换肤、干净视觉底子 都已就绪
   - 没有任何「梦/日历」这类主题专属内容，明天按题填

  全文搜「← 替换」可定位所有要按主题改写的地方。
  技术栈：React 18 (CDN) + Babel classic runtime（已避开 import 报错的坑）。
  如需更工程化，可换 Vite 构建后把产物放到 public/（见 README）。
============================================================================
-->

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
  /* ===== 主题变量：明天按题目情绪改这几行就整体换肤 ← 替换 ===== */
  :root{
    --bg:#0e1014; --surface:#171a21; --surface-2:#1f232c;
    --text:#e8eaf0; --muted:#8b91a1; --accent:#7c8cff; --accent-2:#b98cff;
    --border:#2a2f3a; --radius:16px;
    --font:"PingFang SC","Microsoft YaHei",-apple-system,system-ui,sans-serif;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, color-mix(in srgb,var(--accent) 14%, transparent), transparent),
      radial-gradient(900px 500px at -10% 110%, color-mix(in srgb,var(--accent-2) 12%, transparent), transparent),
      var(--bg);
    color:var(--text); font-family:var(--font); -webkit-font-smoothing:antialiased;
  }
  .surface{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); }
  .surface-2{ background:var(--surface-2); border:1px solid var(--border); }
  .muted{ color:var(--muted); } .accent{ color:var(--accent); }
  .btn{ border:1px solid var(--border); border-radius:12px; padding:9px 15px; transition:.15s; cursor:pointer;
        background:var(--surface-2); color:var(--text); font-size:14px; font-family:inherit; }
  .btn:hover{ border-color:var(--accent); transform:translateY(-1px); }
  .btn-primary{ background:linear-gradient(135deg,var(--accent),var(--accent-2)); border:none; color:#fff; font-weight:600; }
  .btn-primary:hover{ filter:brightness(1.08); }
  .btn:disabled{ opacity:.5; cursor:not-allowed; transform:none; }
  .input{ background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:11px 13px;
          color:var(--text); width:100%; outline:none; font-size:14px; font-family:inherit; }
  .input:focus{ border-color:var(--accent); }
  .fade-in{ animation:fade .35s ease both; }
  @keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
  .spin{ display:inline-block; width:14px; height:14px; border:2px solid #fff6; border-top-color:#fff;
         border-radius:99px; animation:r .7s linear infinite; }
  @keyframes r{ to{ transform:rotate(360deg); } }
  ::-webkit-scrollbar{ width:10px; } ::-webkit-scrollbar-thumb{ background:var(--border); border-radius:99px; }
</style>
</head>
<body>
<div id="root"></div>

<!-- 自定义 type：浏览器不执行、Babel 自动转译也不碰它（避免用错 runtime） -->
<script type="text/jsx-src" id="app-src">
const { useState, useEffect, useRef } = React;

/* ---- 持久化：一行搞定 localStorage ---- */
function useLocalStorage(key, initial){
  const [v, setV] = useState(() => {
    try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : initial; } catch { return initial; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(v)); } catch {} }, [key, v]);
  return [v, setV];
}

/* ---- ★ AI 调用：统一走后端 /api/ai，内置兜底，永不抛错 ---- */
async function callAI({ prompt, system = '', model, maxTokens = 1024, fallback = '' }){
  try {
    const r = await fetch('/api/ai', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ prompt, system, model, maxTokens, fallback }),
    });
    const data = await r.json();
    return { text: data.text || fallback, source: data.source || 'fallback' };
  } catch (e) {
    console.warn('[callAI 网络失败，走兜底]', e);
    return { text: fallback || '（前端兜底：请求失败）', source: 'fallback' };
  }
}

/* ============================================================================
   根组件 —— 现在放的是一个「AI 试验台 + 持久化记录」的最小演示，
   只为证明 GitHub→Railway→后端→AI→兜底 整条链路通。明天整体替换。← 替换
   ========================================================================== */
function App(){
  const [health, setHealth] = useState(null);
  const [prompt, setPrompt] = useState('');
  const [resp, setResp] = useState(null);      // { text, source }
  const [loading, setLoading] = useState(false);
  const [log, setLog] = useLocalStorage('llt_log', []);   // 持久化的历史记录

  useEffect(() => {
    fetch('/api/health').then(r => r.json()).then(setHealth).catch(() => setHealth({ ok:false }));
  }, []);

  const ask = async () => {
    const p = prompt.trim();
    if (!p) return;
    setLoading(true); setResp(null);
    const out = await callAI({
      prompt: p,
      system: '你是一个简洁、友好的助手。',          // ← 替换：按主题改系统提示
      fallback: '（兜底示例）这是预置文案，演示照常进行。', // ← 替换：预置你的兜底
      maxTokens: 600,
    });
    setResp(out);
    setLog(l => [{ id: Date.now()+''+Math.round(performance.now()), q: p, a: out.text, source: out.source }, ...l].slice(0, 30));
    setLoading(false);
  };

  return (
    <div style={{ maxWidth: 760, margin:'0 auto', padding:'30px 18px 80px' }}>
      <header className="flex items-center justify-between mb-6 fade-in">
        <div>
          <h1 className="text-2xl font-bold m-0" style={{ background:'linear-gradient(135deg,var(--accent),var(--accent-2))',
              WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent' }}>
            项目名 · 待定 {/* ← 替换 */}
          </h1>
          <p className="muted text-sm mt-1 mb-0">通用全栈底座 · GitHub + Railway + 后端代理 AI</p>
        </div>
        {/* 健康指示灯：让你和评委一眼看到「真 API」还是「兜底模式」 */}
        <HealthDot health={health} />
      </header>

      {/* AI 试验台 —— 证明整条链路 */}
      <div className="surface p-5 fade-in mb-5">
        <div className="muted text-sm mb-2">AI 试验台（链路自检 · 明天替换成你的核心动线）</div>
        <textarea className="input" rows={3} placeholder="随便输入点什么，点「发送」测试 AI 链路…"
          value={prompt} onChange={e => setPrompt(e.target.value)}
          onKeyDown={e => { if ((e.metaKey||e.ctrlKey) && e.key === 'Enter') ask(); }} />
        <div className="flex items-center gap-3 mt-3">
          <button className="btn btn-primary" onClick={ask} disabled={loading}>
            {loading ? <span className="spin" /> : '发送'} <span className="muted" style={{fontSize:12, color:'#fff9'}}>⌘/Ctrl+Enter</span>
          </button>
          {resp && <SourceBadge source={resp.source} />}
        </div>
        {resp && (
          <div className="surface-2 rounded-2xl p-4 mt-4 fade-in" style={{ lineHeight:1.8, whiteSpace:'pre-wrap' }}>
            {resp.text}
          </div>
        )}
      </div>

      {/* 持久化历史 —— 证明 localStorage 数据持久化 */}
      <div className="surface p-5 fade-in">
        <div className="flex items-center justify-between mb-3">
          <div className="muted text-sm">历史记录（已持久化 · 刷新不丢）</div>
          {log.length > 0 && <button className="btn" onClick={() => setLog([])} style={{ padding:'4px 10px', fontSize:12 }}>清空</button>}
        </div>
        {log.length === 0
          ? <div className="muted text-sm py-6 text-center">还没有记录。上面发一条试试。</div>
          : <div className="flex flex-col gap-2">
              {log.map(item => (
                <div key={item.id} className="surface-2 rounded-xl p-3">
                  <div className="text-sm" style={{ color:'var(--accent)' }}>{item.q}</div>
                  <div className="text-sm mt-1" style={{ whiteSpace:'pre-wrap' }}>{item.a}</div>
                  <div className="mt-1"><SourceBadge source={item.source} small /></div>
                </div>
              ))}
            </div>}
      </div>
    </div>
  );
}

function HealthDot({ health }){
  if (!health) return <span className="muted text-xs">检测中…</span>;
  const real = health.ok && health.hasKey;
  const color = !health.ok ? '#e05a5a' : (health.hasKey ? '#4ec98a' : '#e3b34d');
  const label = !health.ok ? '后端未连接' : (health.hasKey ? `真 API · ${health.model || ''}` : '兜底模式（未配 key）');
  return (
    <div className="flex items-center gap-2 surface-2 px-3 py-1.5 rounded-full">
      <span style={{ width:8, height:8, borderRadius:99, background:color, display:'inline-block' }} />
      <span className="text-xs muted">{label}</span>
    </div>
  );
}

function SourceBadge({ source, small }){
  const api = source === 'api';
  return (
    <span className="rounded-full" style={{
      fontSize: small ? 10 : 12, padding: small ? '1px 7px' : '3px 9px',
      background: api ? 'color-mix(in srgb,#4ec98a 22%, transparent)' : 'color-mix(in srgb,#e3b34d 22%, transparent)',
      color: api ? '#4ec98a' : '#e3b34d' }}>
      {api ? '真 API' : '兜底'}
    </span>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!-- 引导：classic runtime 手动转译（编译成 React.createElement，不产生 import 语句） -->
<script>
  (function () {
    try {
      const src = document.getElementById('app-src').textContent;
      const out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] });
      new Function(out.code)();
    } catch (e) {
      document.getElementById('root').innerHTML =
        '<pre style="color:#ff8080;padding:24px;white-space:pre-wrap">启动失败：' + (e && e.message) + '</pre>';
      console.error(e);
    }
  })();
</script>
</body>
</html>
